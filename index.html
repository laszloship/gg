<style>
    :root {
        --env-color: #f43f5e;   /* Rose 500 */
        --env-dark: #be123c;    /* Rose 700 */
        --line-color: #9f1239;  /* Rose 800 (Darker red line) */
        --paper-color: #fffaf0;
        --body-color: #e6faff;  /*  */
    }

    body {
        background: var(--body-color);
    }

    .envelope-wrapper {
        perspective: 1000px;
        display: flex;
        justify-content: center;
        /* Positions the envelope toward the bottom */
        align-items: flex-end; 
        /* Adjust this padding to move it higher or lower from the edge */
        padding-bottom: 60px; /* matches .envelope-wrapper::after height */
        height: 100vh;
        /* Keeps the animation clean if the letter goes high */
        overflow: hidden; 
    }

    /* THE BLANKET: Hides the letter peeking out the bottom */
    .envelope-wrapper::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        /* Match the padding-bottom of the wrapper */
        height: 60px; /* matches .envelope-wrapper padding-bottom */
        /* Match your page background color exactly */
        background: var(--body-color);
        /* Sits above the letter but below the envelope */
        z-index: 2; 
    }

    .envelope {
        position: relative;
        width: 320px;
        height: 198px; /* golden ratio  */
        background: var(--env-dark);
        border-radius: 0 0 8px 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        cursor: pointer;
        /* The container itself must not cut off the flap */
    }

    /* 1. THE FLAP */
    .flap {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--env-color);
        clip-path: polygon(0 0, 50% 50%, 100% 0);
        transform-origin: top;
        z-index: 3;
        /*transition: transform 1.5s ease-in-out, z-index 0s 0.75s;*/
        /*transition: transform 3s ease-in-out, z-index 0s 1.5s;*/
        transition: 
            transform 2s ease-in-out, 
            background-color 0s 1.0s, 
            z-index 0s 1.0s;
    }

    /* 2. THE FRONT POCKET (Solid Face) */
    .envelope::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--env-color);
        /* This shape creates the pocket and hides the bottom of the letter */
        clip-path: polygon(0 0%, 50% 50%, 100% 0%, 100% 100%, 0 100%);
        z-index: 2;
    }
    .envelope::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0;
        width: 100%; height: 100%;
        /* We use a slightly darker color for the line */
        background-color: var(--line-color);
        /* The same path, but we move the points slightly to create a 2px offset */
        clip-path: polygon(0 0%, 50% 50%, 100% 0%, 100% 2%, 50% 52%, 0 2%);
        z-index: 2;
    }

    /* 3. THE LETTER (Lengthy Note Fix) */
    .letter {
        position: absolute;
        /* Anchor to top so extra length stays hidden inside the envelope body */
        top: 5%; 
        left: 2%;
        width: 96%;
        /* Let height expand, but the pocket hides the excess */
        height: auto;
        min-height: 180px;
        background: var(--paper-color);
        padding: 10px;
        z-index: 1; 
        /*transition: transform 1s ease-in-out 0.8s;*/
        transition: transform 1.0s ease-in-out 1.25s, z-index 0s 2.25s; /* go in and out ... wait */
    }

    /* --- THE MOTION --- */

    /* --- OPEN STATE --- */
    .envelope.open .flap {
        transform: rotateX(180deg);
        background-color: var(--env-dark); /* Swap to dark at 0.75s */
        z-index: 0;
    }
    /* --- CLOSING STATE --- */
    /* When closing, we want the color to swap back at the same halfway point */
    .envelope:not(.open) .flap {
        transition: 
            transform 2s ease-in-out, 
            background-color 0s 1.0s, 
            z-index 0s 1.0s;
    }

    .envelope.open .letter {
        /* Adjust this based on how much of the note you want to see */
        transform: translateY(-450px); /* UPDATE! */
        z-index: 5;
    }

    /* Immediate drop on close */
    .envelope:not(.open) .letter {
        transition-delay: 0s;
    }

    .instruction {
        position: absolute;
        width: 100%;
        /*top: 60%;*/ /* Positioned in the lower half */
        bottom: 5px;
        text-align: center;
        font-family: 'Arial', sans-serif;
        font-size: 1rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.9); /* Subtle semi-transparent white */
        z-index: 3;
        pointer-events: none; /* Ensures the click still hits the envelope */
        transition: opacity 1.0s ease;

        /* --- ADD THIS LINE --- */
        animation: flash 2s infinite ease-in-out;
    }

    /* THE FLASH LOGIC */
    @keyframes flash {
        0%, 100% {
            opacity: 0.1; /* Dims down */
        }
        50% {
            opacity: 0.9; /* Brightens up */
        }
    }

    /* Optional: Hide the instruction once the envelope is open */
    .envelope.open .instruction {
        opacity: 0;
        animation: none; /* Stops animating once opened */
    }

    #message-text {
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande", sans-serif;
    }

    #message-text p {
        line-height: 1.5;
    }

    hr {
        border: 0;
        border-top: 1px solid #fda4af; /* rose-300 */
        text-align: center;
        overflow: visible;

    hr::after {

    }
